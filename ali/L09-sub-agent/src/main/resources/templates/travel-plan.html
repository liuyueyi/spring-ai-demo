<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 旅游行程规划 - 多智能体协作</title>
    <!-- 引入 marked.js 用于 Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .input-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto 20px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-item label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9em;
        }

        .form-item input {
            padding: 12px 15px;
            font-size: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-item input:focus {
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .btn-group button {
            padding: 15px 40px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .btn-group button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px;
        }

        .stage-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stage-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #e9ecef;
        }

        .stage-panel.active::before {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .stage-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .stage-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f8f9fa;
        }

        .stage-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #f8f9fa;
        }

        .stage-panel.active .stage-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stage-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #495057;
        }

        .stage-content {
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.8;
            color: #212529;
        }

        /* Markdown 样式优化 */
        .stage-content h1,
        .stage-content h2,
        .stage-content h3,
        .stage-content h4,
        .stage-content h5,
        .stage-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #24292e;
        }

        .stage-content h1 {
            font-size: 2em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #eaecef;
        }

        .stage-content h2 {
            font-size: 1.5em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #eaecef;
        }

        .stage-content h3 {
            font-size: 1.25em;
        }

        .stage-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .stage-content ul,
        .stage-content ol {
            padding-left: 2em;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .stage-content li {
            margin-top: 0.25em;
        }

        .stage-content li + li {
            margin-top: 0.25em;
        }

        .stage-content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin: 0 0 16px 0;
        }

        .stage-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .stage-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 3px;
            margin: 0 0 16px 0;
        }

        .stage-content pre code {
            display: inline;
            max-width: none;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }

        .stage-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0 0 16px 0;
            display: block;
            overflow: auto;
        }

        .stage-content table th,
        .stage-content table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        .stage-content table tr {
            background-color: #fff;
            border-top: 1px solid #c6cbd1;
        }

        .stage-content table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        .stage-content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        .stage-content a {
            color: #0366d6;
            text-decoration: none;
        }

        .stage-content a:hover {
            text-decoration: underline;
        }

        .stage-content strong {
            font-weight: 600;
        }

        .stage-content::-webkit-scrollbar {
            width: 8px;
        }

        .stage-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .stage-content::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .status-bar {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dee2e6;
        }

        .status-indicator.active {
            background: #28a745;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            border-left: 4px solid #f5c6cb;
        }

        .placeholder-text {
            color: #adb5bd;
            text-align: center;
            padding: 50px 20px;
            font-style: italic;
        }

        .agent-status {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .agent-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            background: #e9ecef;
            color: #495057;
            transition: all 0.3s;
        }

        .agent-badge.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        @media (max-width: 1024px) {
            .content-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .content-section {
                grid-template-columns: 1fr;
            }

            .form-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ AI 旅游行程规划</h1>
            <p>基于多智能体协作的流式旅行计划生成系统</p>
        </div>

        <div class="input-section">
            <div class="form-group">
                <div class="form-item">
                    <label for="destination">目的地 *</label>
                    <input type="text" id="destination" placeholder="例如：北京、巴黎、东京" onkeypress="if(event.keyCode===13) startPlanning()" value="武汉">
                </div>
                <div class="form-item">
                    <label for="days">旅行天数</label>
                    <input type="number" id="days" value="3" min="1" max="30" placeholder="天数">
                </div>
                <div class="form-item">
                    <label for="budget">预算</label>
                    <input type="text" id="budget" placeholder="例如：5000 元、$1000" value="6000">
                </div>
                <div class="form-item">
                    <label for="preferences">偏好</label>
                    <input type="text" id="preferences" placeholder="例如：美食、购物、自然风光、历史文化" value="美食、人文景观">
                </div>
            </div>
            <div class="btn-group">
                <button id="planBtn" onclick="startPlanning()">开始规划</button>
                <button id="resetBtn" onclick="resetPlanning()" style="background: linear-gradient(135deg, #6c757d 0%, #495057 100%);">重置</button>
            </div>
        </div>

        <div class="content-section">
            <!-- 景点推荐面板 -->
            <div class="stage-panel" id="attractionPanel">
                <div class="stage-header">
                    <div class="stage-icon">🏛️</div>
                    <div class="stage-title">景点推荐</div>
                </div>
                <div class="stage-content" id="attractionContent">
                    <div class="placeholder-text">等待开始规划...</div>
                </div>
            </div>

            <!-- 住宿推荐面板 -->
            <div class="stage-panel" id="hotelPanel">
                <div class="stage-header">
                    <div class="stage-icon">🏨</div>
                    <div class="stage-title">住宿推荐</div>
                </div>
                <div class="stage-content" id="hotelContent">
                    <div class="placeholder-text">等待景点安排...</div>
                </div>
            </div>

            <!-- 交通规划面板 -->
            <div class="stage-panel" id="transportPanel">
                <div class="stage-header">
                    <div class="stage-icon">🚗</div>
                    <div class="stage-title">交通规划</div>
                </div>
                <div class="stage-content" id="transportContent">
                    <div class="placeholder-text">等待景点安排...</div>
                </div>
            </div>

            <!-- 监督者统筹面板 -->
            <div class="stage-panel" id="supervisorPanel">
                <div class="stage-header">
                    <div class="stage-icon">📋</div>
                    <div class="stage-title">完整方案</div>
                </div>
                <div class="stage-content" id="supervisorContent">
                    <div class="placeholder-text">等待各专家完成...</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-left">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">准备就绪</span>
            </div>
            <div class="agent-status" id="agentStatus">
                <div class="agent-badge" id="badge-attraction">🏛️ 景点专家</div>
                <div class="agent-badge" id="badge-hotel">🏨 酒店专家</div>
                <div class="agent-badge" id="badge-transport">🚗 交通专家</div>
                <div class="agent-badge" id="badge-supervisor">📋 监督者</div>
            </div>
        </div>
    </div>

    <script>
        // 配置 marked.js 使用 highlight.js 进行代码高亮
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) {
                            console.error('代码高亮失败:', e);
                        }
                    }
                    return code;
                },
                breaks: true, // 启用换行符转换为<br>
                gfm: true // 启用 GitHub Flavored Markdown
            });
        }

        let eventSource = null;
        const planBtn = document.getElementById('planBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        let isPlanningComplete = false; // 标记规划是否已完成

        // 内容累加器
        const contentAccumulators = {
            attraction: '',
            hotel: '',
            transport: '',
            supervisor: ''
        };

        function startPlanning() {
            const destination = document.getElementById('destination').value.trim();
            if (!destination) {
                alert('请输入目的地！');
                return;
            }

            const days = document.getElementById('days').value || '3';
            const budget = document.getElementById('budget').value.trim();
            const preferences = document.getElementById('preferences').value.trim();

            // 重置状态
            resetState();
            
            // 禁用按钮
            planBtn.disabled = true;
            planBtn.textContent = '规划中...';

            // 更新状态
            statusIndicator.classList.add('active');
            statusText.textContent = '正在连接服务器...';
            
            // 重置完成标记
            isPlanningComplete = false;

            // 建立 SSE 连接
            const url = `/api/travel/plan?destination=${encodeURIComponent(destination)}&days=${encodeURIComponent(days)}&budget=${encodeURIComponent(budget)}&preferences=${encodeURIComponent(preferences)}`;
            eventSource = new EventSource(url);

            // 监听消息事件
            eventSource.addEventListener('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.error) {
                        handleError(data.errorMessage);
                        return;
                    }

                    // 根据阶段更新对应的面板
                    if (data.stage && data.hasContent) {
                        updateStageContent(data.stage, data.content);
                        activatePanel(data.stage);
                        updateAgentBadge(data.stage);
                        
                        // 更新状态文本
                        const stageNames = {
                            'attraction': '正在规划景点...',
                            'hotel': '正在推荐住宿...',
                            'transport': '正在规划交通...',
                            'supervisor': '正在整合方案...'
                        };
                        statusText.textContent = stageNames[data.stage] || '处理中...';
                        
                        // 如果是 supervisor 阶段且有内容，标记为即将完成
                        if (data.stage === 'supervisor') {
                            isPlanningComplete = true;
                        }
                    }
                } catch (e) {
                    console.error('解析数据失败:', e);
                }
            });

            eventSource.addEventListener('done', () => {
                console.log('SSE 连接已完成，主动关闭啦');
                completePlanning();
            });

            // 监听连接打开
            eventSource.onopen = function() {
                console.log('SSE 连接已建立');
            };

            // 监听连接关闭
            eventSource.onerror = function(event) {
                console.log('SSE 连接异常触发，readyState:', event, eventSource.readyState);
                
                // 关闭连接以防止自动重连
                if (eventSource) {
                    eventSource.close();
                }
                
                // 如果已经完成规划（收到 supervisor 阶段的数据），则显示完成状态
                if (isPlanningComplete) {
                    completePlanning();
                } else {
                    // 检查是否有内容被生成
                    const hasAnyContent = contentAccumulators.attraction.length > 0 || 
                                         contentAccumulators.hotel.length > 0 || 
                                         contentAccumulators.transport.length > 0;
                    
                    if (hasAnyContent) {
                        // 如果有内容生成，说明是正常完成，只是可能没走到 supervisor 阶段
                        completePlanning();
                    } else {
                        // 否则说明是异常断开，显示错误
                        handleError('连接意外断开');
                    }
                }
            };
        }

        function resetState() {
            // 关闭之前的连接
            if (eventSource) {
                eventSource.close();
            }

            // 清空内容累加器
            contentAccumulators.attraction = '';
            contentAccumulators.hotel = '';
            contentAccumulators.transport = '';
            contentAccumulators.supervisor = '';

            // 清空所有面板
            document.getElementById('attractionContent').innerHTML = '<div class="placeholder-text">等待开始规划...</div>';
            document.getElementById('hotelContent').innerHTML = '<div class="placeholder-text">等待景点安排...</div>';
            document.getElementById('transportContent').innerHTML = '<div class="placeholder-text">等待景点安排...</div>';
            document.getElementById('supervisorContent').innerHTML = '<div class="placeholder-text">等待各专家完成...</div>';

            // 移除所有激活状态
            document.querySelectorAll('.stage-panel').forEach(panel => {
                panel.classList.remove('active');
            });

            // 重置 Agent 徽章
            document.querySelectorAll('.agent-badge').forEach(badge => {
                badge.classList.remove('active');
            });
        }

        function updateStageContent(stage, content) {
            // 累加内容
            contentAccumulators[stage] += content;
            
            // 更新对应面板的内容
            const contentId = stage + 'Content';
            const contentElement = document.getElementById(contentId);
            
            if (contentElement) {
                // 使用 marked.js 将 Markdown 转换为 HTML
                const htmlContent = marked.parse(contentAccumulators[stage]);
                contentElement.innerHTML = htmlContent;
                
                // 滚动到底部
                contentElement.scrollTop = contentElement.scrollHeight;
            }
        }

        function activatePanel(stage) {
            // 先移除所有激活状态
            document.querySelectorAll('.stage-panel').forEach(panel => {
                panel.classList.remove('active');
            });

            // 激活当前面板
            const panelId = stage + 'Panel';
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.add('active');
            }
        }

        function updateAgentBadge(stage) {
            // 先移除所有激活状态
            document.querySelectorAll('.agent-badge').forEach(badge => {
                badge.classList.remove('active');
            });

            // 激活当前 Agent 徽章
            const badgeId = 'badge-' + stage;
            const badge = document.getElementById(badgeId);
            if (badge) {
                badge.classList.add('active');
            }
        }

        function handleError(message) {
            statusIndicator.classList.remove('active');
            statusText.textContent = '发生错误';
            
            const errorHtml = `
                <div class="error-message">
                    <strong>❌ 错误：</strong> ${escapeHtml(message)}
                </div>
            `;
            
            // 在所有面板中显示错误
            document.getElementById('supervisorContent').innerHTML = errorHtml;
            
            planBtn.disabled = false;
            planBtn.textContent = '开始规划';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function completePlanning() {
            statusIndicator.classList.remove('active');
            statusText.textContent = '规划完成！';
            planBtn.disabled = false;
            planBtn.textContent = '开始规划';
            
            // 移除所有激活状态
            document.querySelectorAll('.stage-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            // 移除所有 Agent 徽章激活状态
            document.querySelectorAll('.agent-badge').forEach(badge => {
                badge.classList.remove('active');
            });
        }

        function resetPlanning() {
            // 重置输入框
            document.getElementById('destination').value = '';
            document.getElementById('days').value = '3';
            document.getElementById('budget').value = '';
            document.getElementById('preferences').value = '';
            
            // 重置状态
            resetState();
            statusText.textContent = '准备就绪';
        }
    </script>
</body>
</html>
