<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文章创作 - 多智能体协作</title>
    <!-- 引入 marked.js 用于 Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .input-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .input-group {
            display: flex;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
        }

        .input-group button {
            padding: 15px 40px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-group button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .input-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px;
        }

        .stage-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stage-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #e9ecef;
        }

        .stage-panel.active::before {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .stage-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .stage-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f8f9fa;
        }

        .stage-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #f8f9fa;
        }

        .stage-panel.active .stage-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stage-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #495057;
        }

        .stage-content {
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.8;
            color: #212529;
        }

        /* Markdown 样式优化 */
        .stage-content h1,
        .stage-content h2,
        .stage-content h3,
        .stage-content h4,
        .stage-content h5,
        .stage-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #24292e;
        }

        .stage-content h1 {
            font-size: 2em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #eaecef;
        }

        .stage-content h2 {
            font-size: 1.5em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #eaecef;
        }

        .stage-content h3 {
            font-size: 1.25em;
        }

        .stage-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .stage-content ul,
        .stage-content ol {
            padding-left: 2em;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .stage-content li {
            margin-top: 0.25em;
        }

        .stage-content li + li {
            margin-top: 0.25em;
        }

        .stage-content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin: 0 0 16px 0;
        }

        .stage-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .stage-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 3px;
            margin: 0 0 16px 0;
        }

        .stage-content pre code {
            display: inline;
            max-width: none;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }

        .stage-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0 0 16px 0;
            display: block;
            overflow: auto;
        }

        .stage-content table th,
        .stage-content table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        .stage-content table tr {
            background-color: #fff;
            border-top: 1px solid #c6cbd1;
        }

        .stage-content table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        .stage-content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        .stage-content a {
            color: #0366d6;
            text-decoration: none;
        }

        .stage-content a:hover {
            text-decoration: underline;
        }

        .stage-content strong {
            font-weight: 600;
        }

        .stage-content::-webkit-scrollbar {
            width: 8px;
        }

        .stage-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .stage-content::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-bar {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dee2e6;
        }

        .status-indicator.active {
            background: #28a745;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            border-left: 4px solid #f5c6cb;
        }

        .placeholder-text {
            color: #adb5bd;
            text-align: center;
            padding: 50px 20px;
            font-style: italic;
        }

        @media (max-width: 1024px) {
            .content-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 AI 文章创作</h1>
            <p>基于多智能体协作的流式文章生成系统</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="topicInput" placeholder="请输入文章主题，例如：春天的童话故事" 
                       onkeypress="if(event.keyCode===13) startCreation()">
                <button id="createBtn" onclick="startCreation()">开始创作</button>
            </div>
        </div>

        <div class="content-section">
            <!-- 大纲面板 -->
            <div class="stage-panel" id="outlinePanel">
                <div class="stage-header">
                    <div class="stage-icon">📋</div>
                    <div class="stage-title">大纲设计</div>
                </div>
                <div class="stage-content" id="outlineContent">
                    <div class="placeholder-text">等待开始创作...</div>
                </div>
            </div>

            <!-- 初稿面板 -->
            <div class="stage-panel" id="draftPanel">
                <div class="stage-header">
                    <div class="stage-icon">✍️</div>
                    <div class="stage-title">初稿撰写</div>
                </div>
                <div class="stage-content" id="draftContent">
                    <div class="placeholder-text">等待大纲完成...</div>
                </div>
            </div>

            <!-- 评审优化面板 -->
            <div class="stage-panel" id="reviewPanel">
                <div class="stage-header">
                    <div class="stage-icon">✨</div>
                    <div class="stage-title">优化润色</div>
                </div>
                <div class="stage-content" id="reviewContent">
                    <div class="placeholder-text">等待初稿完成...</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">准备就绪</span>
        </div>
    </div>

    <script>
        // 配置 marked.js 使用 highlight.js 进行代码高亮
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) {
                            console.error('代码高亮失败:', e);
                        }
                    }
                    return code;
                },
                breaks: true, // 启用换行符转换为<br>
                gfm: true // 启用 GitHub Flavored Markdown
            });
        }

        let eventSource = null;
        const createBtn = document.getElementById('createBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        let isCreationComplete = false; // 标记创作是否已完成

        // 内容累加器
        const contentAccumulators = {
            outline: '',
            draft: '',
            review: ''
        };

        function startCreation() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('请输入文章主题！');
                return;
            }

            // 重置状态
            resetState();
            
            // 禁用按钮
            createBtn.disabled = true;
            createBtn.textContent = '创作中...';

            // 更新状态
            statusIndicator.classList.add('active');
            statusText.textContent = '正在连接服务器...';
            
            // 重置完成标记
            isCreationComplete = false;

            // 建立 SSE 连接
            const url = `/api/writer/stream?topic=${encodeURIComponent(topic)}`;
            eventSource = new EventSource(url);

            // 监听消息事件
            eventSource.addEventListener('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.error) {
                        handleError(data.errorMessage);
                        return;
                    }

                    // 根据阶段更新对应的面板
                    if (data.stage && data.hasContent) {
                        updateStageContent(data.stage, data.content);
                        activatePanel(data.stage);
                        
                        // 更新状态文本
                        const stageNames = {
                            'outline': '正在生成大纲...',
                            'draft': '正在撰写初稿...',
                            'review': '正在优化润色...'
                        };
                        statusText.textContent = stageNames[data.stage] || '处理中...';
                        
                        // 如果是 review 阶段且有内容，标记为即将完成
                        if (data.stage === 'review') {
                            isCreationComplete = true;
                        }
                    }
                } catch (e) {
                    console.error('解析数据失败:', e);
                }
            });
            eventSource.addEventListener('done', () => {
                console.log('SSE 连接已完成，主动关闭啦')
                completeCreation();
            });

            // 监听连接打开
            eventSource.onopen = function() {
                console.log('SSE 连接已建立');
            };

            // 监听连接关闭
            eventSource.onerror = function(event) {
                console.log('SSE 连接异常触发，readyState:', event, eventSource.readyState);
                
                // 关闭连接以防止自动重连
                if (eventSource) {
                    eventSource.close();
                }
                
                // 如果已经完成创作（收到 review 阶段的数据），则显示完成状态
                if (isCreationComplete) {
                    completeCreation();
                } else {
                    // 检查是否有内容被生成
                    const hasAnyContent = contentAccumulators.outline.length > 0 || 
                                         contentAccumulators.draft.length > 0 || 
                                         contentAccumulators.review.length > 0;
                    
                    if (hasAnyContent) {
                        // 如果有内容生成，说明是正常完成，只是可能没走到 review 阶段
                        completeCreation();
                    } else {
                        // 否则说明是异常断开，显示错误
                        handleError('连接意外断开');
                    }
                }
            };
        }

        function resetState() {
            // 关闭之前的连接
            if (eventSource) {
                eventSource.close();
            }

            // 清空内容累加器
            contentAccumulators.outline = '';
            contentAccumulators.draft = '';
            contentAccumulators.review = '';

            // 清空所有面板
            document.getElementById('outlineContent').innerHTML = '<div class="placeholder-text">等待开始创作...</div>';
            document.getElementById('draftContent').innerHTML = '<div class="placeholder-text">等待大纲完成...</div>';
            document.getElementById('reviewContent').innerHTML = '<div class="placeholder-text">等待初稿完成...</div>';

            // 移除所有激活状态
            document.querySelectorAll('.stage-panel').forEach(panel => {
                panel.classList.remove('active');
            });
        }

        function updateStageContent(stage, content) {
            // 累加内容
            contentAccumulators[stage] += content;
            
            // 更新对应面板的内容
            const contentId = stage + 'Content';
            const contentElement = document.getElementById(contentId);
            
            if (contentElement) {
                // 使用 marked.js 将 Markdown 转换为 HTML
                const htmlContent = marked.parse(contentAccumulators[stage]);
                contentElement.innerHTML = htmlContent;
                
                // 滚动到底部
                contentElement.scrollTop = contentElement.scrollHeight;
            }
        }

        function activatePanel(stage) {
            // 先移除所有激活状态
            document.querySelectorAll('.stage-panel').forEach(panel => {
                panel.classList.remove('active');
            });

            // 激活当前面板
            const panelId = stage + 'Panel';
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.add('active');
            }
        }

        function handleError(message) {
            statusIndicator.classList.remove('active');
            statusText.textContent = '发生错误';
            
            const errorHtml = `
                <div class="error-message">
                    <strong>❌ 错误：</strong> ${escapeHtml(message)}
                </div>
            `;
            
            // 在所有面板中显示错误
            document.getElementById('reviewContent').innerHTML = errorHtml;
            
            createBtn.disabled = false;
            createBtn.textContent = '开始创作';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function completeCreation() {
            statusIndicator.classList.remove('active');
            statusText.textContent = '创作完成！';
            createBtn.disabled = false;
            createBtn.textContent = '开始创作';
            
            // 移除所有激活状态
            document.querySelectorAll('.stage-panel').forEach(panel => {
                panel.classList.remove('active');
            });
        }
    </script>
</body>
</html>
