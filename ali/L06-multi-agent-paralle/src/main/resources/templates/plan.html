<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 方案策划 - 并行多智能体协作</title>
    <!-- 引入 marked.js 用于 Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .input-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .input-group {
            display: flex;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
        }

        .input-group button {
            padding: 15px 40px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-group button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .input-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .agents-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px;
        }

        .agent-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
            border-top: 4px solid #e9ecef;
        }

        .agent-panel.active {
            border-top-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .agent-panel.creative {
            border-top-color: #FF6B6B;
        }

        .agent-panel.creative.active {
            border-top-color: #FF6B6B;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.2);
        }

        .agent-panel.budget {
            border-top-color: #4ECDC4;
        }

        .agent-panel.budget.active {
            border-top-color: #4ECDC4;
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.2);
        }

        .agent-panel.execution {
            border-top-color: #FFE66D;
        }

        .agent-panel.execution.active {
            border-top-color: #FFE66D;
            box-shadow: 0 8px 25px rgba(255, 230, 109, 0.2);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f8f9fa;
        }

        .agent-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #f8f9fa;
        }

        .agent-panel.active .agent-icon {
            color: white;
        }

        .agent-panel.creative .agent-icon {
            background: #FF6B6B;
        }

        .agent-panel.budget .agent-icon {
            background: #4ECDC4;
        }

        .agent-panel.execution .agent-icon {
            background: #FFE66D;
            color: #333;
        }

        .agent-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #495057;
        }

        .agent-status {
            margin-left: auto;
            font-size: 0.9em;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e9ecef;
            color: #6c757d;
        }

        .agent-panel.active .agent-status {
            background: #667eea;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .agent-content {
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            line-height: 1.8;
            color: #212529;
        }

        .agent-content::-webkit-scrollbar {
            width: 8px;
        }

        .agent-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .agent-content::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        /* Markdown 样式优化 */
        .agent-content h1,
        .agent-content h2,
        .agent-content h3,
        .agent-content h4,
        .agent-content h5,
        .agent-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #24292e;
        }

        .agent-content h1 {
            font-size: 2em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #eaecef;
        }

        .agent-content h2 {
            font-size: 1.5em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #eaecef;
        }

        .agent-content h3 {
            font-size: 1.25em;
        }

        .agent-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .agent-content ul,
        .agent-content ol {
            padding-left: 2em;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .agent-content li {
            margin-top: 0.25em;
        }

        .agent-content li + li {
            margin-top: 0.25em;
        }

        .agent-content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin: 0 0 16px 0;
        }

        .agent-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .agent-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 3px;
            margin: 0 0 16px 0;
        }

        .agent-content pre code {
            display: inline;
            max-width: none;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }

        .agent-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0 0 16px 0;
            display: block;
            overflow: auto;
        }

        .agent-content table th,
        .agent-content table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        .agent-content table tr {
            background-color: #fff;
            border-top: 1px solid #c6cbd1;
        }

        .agent-content table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        .agent-content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        .agent-content a {
            color: #0366d6;
            text-decoration: none;
        }

        .agent-content a:hover {
            text-decoration: underline;
        }

        .agent-content strong {
            font-weight: 600;
        }

        .final-plan-section {
            padding: 0 30px 30px;
        }

        .final-plan-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .final-plan-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .final-plan-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.2);
        }

        .final-plan-title {
            font-size: 1.8em;
            font-weight: bold;
        }

        .final-plan-status {
            margin-left: auto;
            font-size: 1em;
            padding: 8px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .final-plan-content {
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .final-plan-content::-webkit-scrollbar {
            width: 8px;
        }

        .final-plan-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .final-plan-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .final-plan-content h1,
        .final-plan-content h2,
        .final-plan-content h3 {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        .final-plan-content p,
        .final-plan-content li,
        .final-plan-content td {
            color: rgba(255, 255, 255, 0.95);
        }

        .status-bar {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dee2e6;
        }

        .status-indicator.active {
            background: #28a745;
            animation: pulse 1.5s infinite;
        }

        .placeholder-text {
            color: #adb5bd;
            text-align: center;
            padding: 50px 20px;
            font-style: italic;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            border-left: 4px solid #f5c6cb;
        }

        @media (max-width: 1024px) {
            .agents-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AI 方案策划</h1>
            <p>基于并行多智能体协作的方案生成系统</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="topicInput" placeholder="请输入策划主题，例如：公司年会策划方案" 
                       onkeypress="if(event.keyCode===13) startPlanning()">
                <button id="startBtn" onclick="startPlanning()">开始策划</button>
            </div>
        </div>

        <div class="agents-section">
            <!-- CreativeAgent 面板 -->
            <div class="agent-panel creative" id="creativePanel">
                <div class="agent-header">
                    <div class="agent-icon">💡</div>
                    <div class="agent-title">创意策划</div>
                    <div class="agent-status" id="creativeStatus">等待中</div>
                </div>
                <div class="agent-content" id="creativeContent">
                    <div class="placeholder-text">等待创意灵感...</div>
                </div>
            </div>

            <!-- BudgetAgent 面板 -->
            <div class="agent-panel budget" id="budgetPanel">
                <div class="agent-header">
                    <div class="agent-icon">💰</div>
                    <div class="agent-title">预算评估</div>
                    <div class="agent-status" id="budgetStatus">等待中</div>
                </div>
                <div class="agent-content" id="budgetContent">
                    <div class="placeholder-text">等待预算分析...</div>
                </div>
            </div>

            <!-- ExecutionAgent 面板 -->
            <div class="agent-panel execution" id="executionPanel">
                <div class="agent-header">
                    <div class="agent-icon">⚙️</div>
                    <div class="agent-title">执行规划</div>
                    <div class="agent-status" id="executionStatus">等待中</div>
                </div>
                <div class="agent-content" id="executionContent">
                    <div class="placeholder-text">等待执行计划...</div>
                </div>
            </div>
        </div>

        <div class="final-plan-section">
            <div class="final-plan-panel">
                <div class="final-plan-header">
                    <div class="final-plan-icon">📋</div>
                    <div class="final-plan-title">完整策划方案</div>
                    <div class="final-plan-status" id="finalStatus">等待汇总</div>
                </div>
                <div class="final-plan-content" id="finalContent">
                    <div class="placeholder-text">等待各 Agent 输出完成后自动生成完整方案...</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">准备就绪</span>
        </div>
    </div>

    <script>
        // 配置 marked.js 使用 highlight.js 进行代码高亮
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) {
                            console.error('代码高亮失败:', e);
                        }
                    }
                    return code;
                },
                breaks: true, // 启用换行符转换为<br>
                gfm: true // 启用 GitHub Flavored Markdown
            });
        }

        let eventSource = null;
        const startBtn = document.getElementById('startBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');

        // 内容累加器
        const contentAccumulators = {
            creative: '',
            budget: '',
            execution: '',
            final: ''
        };

        // Agent 状态映射
        const agentMapping = {
            'subgraph_creative_agent': { stage: 'creative', panelId: 'creativePanel', contentId: 'creativeContent', statusId: 'creativeStatus' },
            'subgraph_budget_agent': { stage: 'budget', panelId: 'budgetPanel', contentId: 'budgetContent', statusId: 'budgetStatus' },
            'subgraph_execution_agent': { stage: 'execution', panelId: 'executionPanel', contentId: 'executionContent', statusId: 'executionStatus' },
            'parallel_plan_agent': { stage: 'final', panelId: null, contentId: 'finalContent', statusId: 'finalStatus' },
            'subgraph_complete_agent': { stage: 'final', panelId: null, contentId: 'finalContent', statusId: 'finalStatus' }
        };

        function startPlanning() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('请输入策划主题！');
                return;
            }

            // 重置状态
            resetState();
            
            // 禁用按钮
            startBtn.disabled = true;
            startBtn.textContent = '策划中...';

            // 更新状态
            statusIndicator.classList.add('active');
            statusText.textContent = '正在连接服务器...';

            // 建立 SSE 连接
            const url = `/api/writer/stream?topic=${encodeURIComponent(topic)}`;
            eventSource = new EventSource(url);

            // 监听消息事件
            eventSource.addEventListener('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    console.log('收到数据:', data);
                    
                    if (data.error) {
                        handleError(data.errorMessage);
                        return;
                    }

                    // 根据 agent 类型更新对应的面板
                    if (data.stage && data.hasContent) {
                        const mapping = agentMapping[data.agent];
                        if (mapping) {
                            updateAgentContent(mapping, data.content);
                            
                            // 如果是子 Agent，激活对应面板
                            if (mapping.panelId) {
                                activatePanel(mapping.panelId);
                                updateAgentStatus(mapping.statusId, '处理中...');
                            } else {
                                // 最终方案
                                updateFinalStatus('汇总中...');
                            }
                        } else {
                            // 如果没有找到映射，尝试根据 stage 匹配
                            if (data.stage === 'creative') {
                                updateAgentContent({ stage: 'creative', contentId: 'creativeContent', statusId: 'creativeStatus' }, data.content);
                                activatePanel('creativePanel');
                                updateAgentStatus('creativeStatus', '处理中...');
                            } else if (data.stage === 'budget') {
                                updateAgentContent({ stage: 'budget', contentId: 'budgetContent', statusId: 'budgetStatus' }, data.content);
                                activatePanel('budgetPanel');
                                updateAgentStatus('budgetStatus', '处理中...');
                            } else if (data.stage === 'execution') {
                                updateAgentContent({ stage: 'execution', contentId: 'executionContent', statusId: 'executionStatus' }, data.content);
                                activatePanel('executionPanel');
                                updateAgentStatus('executionStatus', '处理中...');
                            } else if (data.stage === 'final') {
                                updateAgentContent({ stage: 'final', contentId: 'finalContent', statusId: 'finalStatus' }, data.content);
                                updateFinalStatus('汇总中...');
                            }
                        }
                    }
                } catch (e) {
                    console.error('解析数据失败:', e);
                }
            });

            // 监听错误
            eventSource.addEventListener('error', function(event) {
                console.error('SSE 错误:', event);
            });

            // 监听连接打开
            eventSource.onopen = function() {
                console.log('SSE 连接已建立');
            };

            // 监听连接关闭
            eventSource.onerror = function(event) {
                console.log('SSE 连接已关闭，readyState:', eventSource.readyState);
                
                // 关闭连接以防止自动重连
                if (eventSource) {
                    eventSource.close();
                }
                
                // 检查是否有内容被生成
                const hasAnyContent = contentAccumulators.creative.length > 0 || 
                                     contentAccumulators.budget.length > 0 || 
                                     contentAccumulators.execution.length > 0;
                
                if (hasAnyContent) {
                    // 有内容生成，说明是正常完成
                    completePlanning();
                } else {
                    // 没有内容，说明是异常断开
                    handleError('连接意外断开');
                }
            };
        }

        function resetState() {
            // 关闭之前的连接
            if (eventSource) {
                eventSource.close();
            }

            // 清空内容累加器
            contentAccumulators.creative = '';
            contentAccumulators.budget = '';
            contentAccumulators.execution = '';
            contentAccumulators.final = '';

            // 清空所有面板
            document.getElementById('creativeContent').innerHTML = '<div class="placeholder-text">等待创意灵感...</div>';
            document.getElementById('budgetContent').innerHTML = '<div class="placeholder-text">等待预算分析...</div>';
            document.getElementById('executionContent').innerHTML = '<div class="placeholder-text">等待执行计划...</div>';
            document.getElementById('finalContent').innerHTML = '<div class="placeholder-text">等待各 Agent 输出完成后自动生成完整方案...</div>';

            // 重置所有状态
            document.querySelectorAll('.agent-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            document.getElementById('creativeStatus').textContent = '等待中';
            document.getElementById('budgetStatus').textContent = '等待中';
            document.getElementById('executionStatus').textContent = '等待中';
            document.getElementById('finalStatus').textContent = '等待汇总';
            
            // 移除所有激活状态
            document.querySelectorAll('.agent-panel').forEach(panel => {
                panel.classList.remove('active');
            });
        }

        function updateAgentContent(mapping, content) {
            // 累加内容
            contentAccumulators[mapping.stage] += content;
            
            // 更新对应面板的内容
            const contentElement = document.getElementById(mapping.contentId);
            
            if (contentElement) {
                // 使用 marked.js 将 Markdown 转换为 HTML
                const htmlContent = marked.parse(contentAccumulators[mapping.stage]);
                contentElement.innerHTML = htmlContent;
                
                // 滚动到底部
                contentElement.scrollTop = contentElement.scrollHeight;
            }
        }

        function activatePanel(panelId) {
            // 先移除所有激活状态
            document.querySelectorAll('.agent-panel').forEach(panel => {
                panel.classList.remove('active');
            });

            // 激活当前面板
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.add('active');
            }
        }

        function updateAgentStatus(statusId, status) {
            const statusElement = document.getElementById(statusId);
            if (statusElement) {
                statusElement.textContent = status;
            }
        }

        function updateFinalStatus(status) {
            const statusElement = document.getElementById('finalStatus');
            if (statusElement) {
                statusElement.textContent = status;
            }
        }

        function handleError(message) {
            statusIndicator.classList.remove('active');
            statusText.textContent = '发生错误';
            
            const errorHtml = `
                <div class="error-message">
                    <strong>❌ 错误：</strong> ${escapeHtml(message)}
                </div>
            `;
            
            // 在最终面板中显示错误
            document.getElementById('finalContent').innerHTML = errorHtml;
            
            startBtn.disabled = false;
            startBtn.textContent = '开始策划';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function completePlanning() {
            statusIndicator.classList.remove('active');
            statusText.textContent = '策划完成！';
            startBtn.disabled = false;
            startBtn.textContent = '开始策划';
            
            // 更新最终状态
            updateFinalStatus('已完成');
            
            // 移除所有激活状态
            document.querySelectorAll('.agent-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            // 更新各 Agent 状态为完成
            updateAgentStatus('creativeStatus', '已完成');
            updateAgentStatus('budgetStatus', '已完成');
            updateAgentStatus('executionStatus', '已完成');
        }
    </script>
</body>
</html>
